version: 1
name: synccontext
description: |
  Shared team memory for AI coding agents. Save architecture decisions, patterns, and conventions — every team member's AI agent gets instant access via semantic search. 14 tools, multi-project isolation, pgvector, auto-detect embeddings (Gemini/OpenAI/Ollama).

runtime: python
entry: server/main.py

build:
  install: pip install -e .

startCommand:
  type: stdio
  command: python -c "from server.main import main; main()"

secrets:
  - name: SYNCCONTEXT_DATABASE_URL
    required: true
    description: "PostgreSQL connection string with pgvector enabled."

  - name: SYNCCONTEXT_DIRECT_URL
    required: false
    description: "Direct PostgreSQL connection for migrations when DATABASE_URL uses a pooler."

  - name: SYNCCONTEXT_GEMINI_API_KEY
    required: false
    description: "Gemini API key for embeddings (free tier). Get one at https://aistudio.google.com/apikey"

  - name: SYNCCONTEXT_OPENAI_API_KEY
    required: false
    description: "OpenAI API key for embeddings (paid). Alternative to Gemini."

  - name: SYNCCONTEXT_OLLAMA_BASE_URL
    required: false
    description: "Ollama server URL for offline embeddings."

  - name: SYNCCONTEXT_PROJECT_TOKEN
    required: true
    description: "Shared project token for the hosted deployment."

  - name: SYNCCONTEXT_PROJECT_NAME
    required: false
    description: "Project display name (auto-created on first connection)."
