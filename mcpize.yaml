version: 1
name: synccontext
description: |
  Shared team memory for AI coding agents. Save architecture decisions, patterns, and conventions — every team member's AI agent gets instant access via semantic search. 14 tools, multi-project isolation, pgvector, auto-detect embeddings (Gemini/OpenAI/Ollama).

runtime: container
entry: infinitytools/synccontext:latest

startCommand:
  type: stdio
  command: synccontext

bridge:
  mode: stdio

secrets:
  - name: SYNCCONTEXT_DATABASE_URL
    required: true
    description: "PostgreSQL connection string with pgvector enabled. Required for server startup."

  - name: SYNCCONTEXT_DIRECT_URL
    required: false
    description: "Direct PostgreSQL connection used for migrations/DDL when DATABASE_URL points to a pooler."

  - name: SYNCCONTEXT_GEMINI_API_KEY
    required: false
    description: "Gemini API key for embeddings (free tier). Get one at https://aistudio.google.com/apikey"

  - name: SYNCCONTEXT_OPENAI_API_KEY
    required: false
    description: "OpenAI API key for embeddings (paid). Alternative to Gemini."

  - name: SYNCCONTEXT_OLLAMA_BASE_URL
    required: false
    description: "Ollama server URL for offline embeddings. E.g. http://localhost:11434"

  - name: SYNCCONTEXT_PROJECT_TOKEN
    required: true
    description: "Shared project token used by the hosted MCPize deployment."

  - name: SYNCCONTEXT_PROJECT_NAME
    required: false
    description: "Shared project display name used when the hosted deployment auto-creates the project."
