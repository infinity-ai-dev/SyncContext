name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.21"

      - name: Install dev dependencies
        run: uv sync --frozen --extra dev

      - name: Run ruff check
        run: uv run ruff check core/ server/

      - name: Run ruff format check
        run: uv run ruff format --check core/ server/

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: synccontext
          POSTGRES_PASSWORD: synccontext
          POSTGRES_DB: synccontext
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U synccontext"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      SYNCCONTEXT_DATABASE_URL: postgresql://synccontext:synccontext@localhost:5432/synccontext
      SYNCCONTEXT_PROJECT_TOKEN: ci-test-token
      SYNCCONTEXT_EMBEDDING_PROVIDER: gemini
      SYNCCONTEXT_VECTOR_STORE: pgvector
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.21"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v

  docker-build:
    name: Docker build (verify)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: synccontext:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
