version: "3.7"

# ============================================
# SyncContext - Stack para Portainer / Docker Swarm
# ============================================
# Domínio: mcp.rat.mayacrm.shop
# Requer: Postgres com pgvector na rede network_public
#
# Variáveis de ambiente para configurar no Portainer:
#   SYNCCONTEXT_PROJECT_TOKEN    - Token do projeto (gerado no passo de setup)
#   SYNCCONTEXT_GEMINI_API_KEY   - Chave da API do Gemini (https://aistudio.google.com/apikey)
#   SYNCCONTEXT_ADMIN_TOKEN      - Token admin para criar/listar projetos (opcional)

services:
  synccontext:
    image: infinitytools/synccontext:latest
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_public
    environment:
      # Auth
      - SYNCCONTEXT_PROJECT_TOKEN=${SYNCCONTEXT_PROJECT_TOKEN}
      - SYNCCONTEXT_ADMIN_TOKEN=${SYNCCONTEXT_ADMIN_TOKEN:-}
      # Banco de Dados (Postgres existente na rede network_public)
      - SYNCCONTEXT_DATABASE_URL=postgresql://postgres:7y8auHScpUTrQWhjbrlu8yc0RzNib2wn@postgres:5432/synccontext
      # Vector Store
      - SYNCCONTEXT_VECTOR_STORE=pgvector
      # Embedding
      - SYNCCONTEXT_EMBEDDING_PROVIDER=gemini
      - SYNCCONTEXT_GEMINI_API_KEY=${SYNCCONTEXT_GEMINI_API_KEY}
      # Transport HTTP (Traefik faz o SSL)
      - SYNCCONTEXT_TRANSPORT=streamable-http
      - SYNCCONTEXT_HOST=0.0.0.0
      - SYNCCONTEXT_PORT=8080
      - SYNCCONTEXT_LOG_LEVEL=INFO
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.http.routers.synccontext.rule=Host(`mcp.rat.mayacrm.shop`)
        - traefik.http.routers.synccontext.entrypoints=websecure
        - traefik.http.routers.synccontext.tls.certresolver=letsencryptresolver
        - traefik.http.routers.synccontext.service=synccontext
        - traefik.http.services.synccontext.loadbalancer.server.port=8080
        - traefik.http.services.synccontext.loadbalancer.passHostHeader=true
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback

networks:
  network_public:
    name: network_public
    external: true
