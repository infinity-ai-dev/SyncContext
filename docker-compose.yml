# ============================================
# SyncContext - Docker Compose (local + self-hosted)
# ============================================
# Uso:
#   pgvector (default):  docker compose up -d
#   Com Redis:           docker compose --profile redis up -d
#
# Embedding provider é auto-detectado:
#   - GEMINI_API_KEY preenchida → usa Gemini (default, grátis)
#   - OPENAI_API_KEY preenchida → usa OpenAI
#   - OLLAMA_BASE_URL preenchida → usa Ollama (offline)

services:
  synccontext:
    image: infinitytools/synccontext:${SYNCCONTEXT_VERSION:-latest}
    environment:
      # Auth
      SYNCCONTEXT_PROJECT_TOKEN: ${SYNCCONTEXT_PROJECT_TOKEN:-dev-token}
      SYNCCONTEXT_ADMIN_TOKEN: ${SYNCCONTEXT_ADMIN_TOKEN:-}
      # Database
      SYNCCONTEXT_DATABASE_URL: postgresql://synccontext:${POSTGRES_PASSWORD:-synccontext}@postgres:5432/synccontext
      # Vector Store
      SYNCCONTEXT_VECTOR_STORE: ${SYNCCONTEXT_VECTOR_STORE:-pgvector}
      SYNCCONTEXT_REDIS_URL: redis://redis:6379/0
      # Embedding (auto-detect: preencha a credencial do provider desejado)
      SYNCCONTEXT_EMBEDDING_PROVIDER: ${SYNCCONTEXT_EMBEDDING_PROVIDER:-auto}
      SYNCCONTEXT_GEMINI_API_KEY: ${SYNCCONTEXT_GEMINI_API_KEY:-}
      SYNCCONTEXT_OPENAI_API_KEY: ${SYNCCONTEXT_OPENAI_API_KEY:-}
      SYNCCONTEXT_OLLAMA_BASE_URL: ${SYNCCONTEXT_OLLAMA_BASE_URL:-}
      SYNCCONTEXT_OLLAMA_MODEL: ${SYNCCONTEXT_OLLAMA_MODEL:-nomic-embed-text}
      # Transport
      SYNCCONTEXT_TRANSPORT: ${SYNCCONTEXT_TRANSPORT:-stdio}
      SYNCCONTEXT_HOST: "0.0.0.0"
      SYNCCONTEXT_PORT: "8080"
      SYNCCONTEXT_LOG_LEVEL: ${SYNCCONTEXT_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - synccontext-net
    healthcheck:
      test: ["CMD", "python", "-c", "import server.main"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: synccontext
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synccontext}
      POSTGRES_DB: synccontext
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - synccontext-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synccontext -d synccontext"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis/redis-stack:latest
    command: redis-server --appendonly yes
    profiles:
      - redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - synccontext-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  synccontext-net:
    driver: bridge
