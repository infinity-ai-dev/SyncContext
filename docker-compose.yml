version: "3.7"

# ============================================
# SyncContext - Docker Compose
# ============================================
# Uso:
#   docker compose up -d
#
# Embedding provider é auto-detectado:
#   - GEMINI_API_KEY preenchida → usa Gemini (default, grátis)
#   - OPENAI_API_KEY preenchida → usa OpenAI
#   - OLLAMA_BASE_URL preenchida → usa Ollama (offline)
#
# Variáveis de ambiente no Portainer ou .env:
#   SYNCCONTEXT_PROJECT_TOKEN    - Token do projeto
#   SYNCCONTEXT_GEMINI_API_KEY   - Chave Gemini (grátis)
#   SYNCCONTEXT_OPENAI_API_KEY   - Chave OpenAI (opcional)
#   SYNCCONTEXT_OLLAMA_BASE_URL  - URL do Ollama (opcional)
#   SYNCCONTEXT_ADMIN_TOKEN      - Token admin (opcional)

services:
  synccontext:
    image: infinitytools/synccontext:${SYNCCONTEXT_VERSION:-latest}
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_public
    environment:
      # Auth
      - SYNCCONTEXT_PROJECT_TOKEN=${SYNCCONTEXT_PROJECT_TOKEN}
      - SYNCCONTEXT_ADMIN_TOKEN=${SYNCCONTEXT_ADMIN_TOKEN:-}
      # Database (Postgres existente na rede network_public)
      - SYNCCONTEXT_DATABASE_URL=postgresql://postgres:7y8auHScpUTrQWhjbrlu8yc0RzNib2wn@postgres:5432/synccontext
      # Vector Store
      - SYNCCONTEXT_VECTOR_STORE=pgvector
      # Embedding (auto-detectado pela credencial preenchida)
      - SYNCCONTEXT_EMBEDDING_PROVIDER=auto
      - SYNCCONTEXT_GEMINI_API_KEY=${SYNCCONTEXT_GEMINI_API_KEY:-}
      - SYNCCONTEXT_OPENAI_API_KEY=${SYNCCONTEXT_OPENAI_API_KEY:-}
      - SYNCCONTEXT_OLLAMA_BASE_URL=${SYNCCONTEXT_OLLAMA_BASE_URL:-}
      - SYNCCONTEXT_OLLAMA_MODEL=${SYNCCONTEXT_OLLAMA_MODEL:-nomic-embed-text}
      # Transport HTTP (Traefik faz o SSL)
      - SYNCCONTEXT_TRANSPORT=streamable-http
      - SYNCCONTEXT_HOST=0.0.0.0
      - SYNCCONTEXT_PORT=9002
      - SYNCCONTEXT_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9002/mcp"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.http.routers.synccontext.rule=Host(`mcp.rat.mayacrm.shop`)
        - traefik.http.routers.synccontext.entrypoints=websecure
        - traefik.http.routers.synccontext.tls.certresolver=letsencryptresolver
        - traefik.http.routers.synccontext.service=synccontext
        - traefik.http.services.synccontext.loadbalancer.server.port=9002
        - traefik.http.services.synccontext.loadbalancer.passHostHeader=true
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback

networks:
  network_public:
    external: true
    name: network_public
